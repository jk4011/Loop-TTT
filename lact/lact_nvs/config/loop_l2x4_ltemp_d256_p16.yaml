# Per-loop q/k temperature (agents 5,8): tau_l scales q,k so silu(tau*x@w0) changes
# the SwiGLU gate pattern per loop (bandwidth/scale-space). Reshapes function, not
# magnitude -> escapes the lr-trap. init tau=1 (baseline).
patch_size: 16
dim: 256
layers: 2
n_loops: 4
ttt_state_mode: reset
input_injection: none

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: none
      n_loops_max: 4
      loop_temp: true
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
