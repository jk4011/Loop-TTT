# Orthogonal triple-axis stack (train with --loop_sup_weight 0.5):
#   ep2  = inner update epochs (fit axis)
#   pli  = per-loop learned fast-weight init (memory-parameter axis, the binding
#          resource; 0 FLOPs)
#   sup  = per-loop render supervision (loss axis; train flag)
# Each on a distinct axis -> should add (cf. ep2+sup nearly additive).
patch_size: 16
dim: 256
layers: 2
n_loops: 4
ttt_state_mode: reset
input_injection: none

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: none
      n_loops_max: 4
      update_epochs: 2
      per_loop_init: true
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
