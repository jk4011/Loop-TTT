# 2-dial (gates+film) + INNER affine at every inter-matmul seam (user idea: shared matrices -> per-loop different operators)
# (all zero-init, zero FLOPs).
patch_size: 16
dim: 256
layers: 2
n_loops: 4
ttt_state_mode: reset
input_injection: none
loop_gates: true
loop_film: true

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
      loop_inner: true
      n_loops_max: 4
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: none
      n_loops_max: 4
      loop_inner: true
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
      loop_hidden: true
      n_loops_max: 4
