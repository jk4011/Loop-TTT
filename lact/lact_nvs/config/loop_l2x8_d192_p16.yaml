# Width-for-depth point 5 (minimal recipe: no delta): dim 192 buys 8 full joint
# loops at ~0.98x naive FLOPs.
patch_size: 16
dim: 192
layers: 2
n_loops: 8
ttt_state_mode: reset
input_injection: none

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 48
      use_qk_norm: true
  - type: lact_ttt.FastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 192
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
