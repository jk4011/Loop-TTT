# Big-swing "read-heavy" (I8 write->read): inputs write memory in loops 1-2 only;
# loops 3-6 are target-only deep read-out vs frozen memory. ~1.00x FLOPs. + delta.
patch_size: 16
dim: 256
layers: 2
n_loops: 6
ttt_state_mode: reset
input_injection: none
input_loops: 2

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: delta
      n_loops_max: 4
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
