# Width-for-depth trade at iso-compute: dim 224 buys 6 full joint loops at
# ~1.00x the FLOPs of the naive d256 L2x4 loop. + delta writes (+sup at launch).
patch_size: 16
dim: 224
layers: 2
n_loops: 6
ttt_state_mode: reset
input_injection: none

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 56
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 224
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: delta
      n_loops_max: 6
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
