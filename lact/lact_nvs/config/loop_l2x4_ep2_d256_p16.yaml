# TTT-loop physics: inner update epochs. Naive reset loop (L2x4, d256), but each
# pass runs TWO TTT update steps on the same (k,v) chunk instead of one --
# directly attacks the measured single-step underfit (cos_post 0.3-0.5), drift-free
# (k,v fixed within a pass). Attention/MLP/qkv unchanged -> ~1.05x FLOPs.
patch_size: 16
dim: 256
layers: 2
n_loops: 4
ttt_state_mode: reset
input_injection: none

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: none
      n_loops_max: 4
      update_epochs: 2
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
