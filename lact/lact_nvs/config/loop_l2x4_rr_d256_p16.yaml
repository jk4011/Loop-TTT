# TTT-loop physics: READ-side refinement (the untested APPLY axis). Every prior
# mechanism modified the write/update; here each target token, after reading the
# memory once (o = SwiGLU(q; W)), re-queries with q' = normalize(q + 0.15*o) and
# reads again. One extra SwiGLU on the read tokens (~+8% FLOPs). Orthogonal to
# ep2 (write-fit) and sup (loss).
patch_size: 16
dim: 256
layers: 2
n_loops: 4
ttt_state_mode: reset
input_injection: none

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: none
      n_loops_max: 4
      read_refine: 0.15
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
