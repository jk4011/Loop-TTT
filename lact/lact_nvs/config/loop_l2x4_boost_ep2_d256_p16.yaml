# TTT-loop physics stack: boosting (capacity x n_loops via residual specialization)
# + inner update epochs=2 (each residual memory is better fit; attacks underfit).
# Orthogonal mechanisms: boost = WHAT each memory stores, ep2 = HOW WELL it fits.
patch_size: 16
dim: 256
layers: 2
n_loops: 4
ttt_state_mode: carry
input_injection: none

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: boost
      n_loops_max: 4
      update_epochs: 2
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
