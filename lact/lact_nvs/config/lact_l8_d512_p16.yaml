# d512 scale-up: L8 unique anchor (no loop)
patch_size: 16
dim: 512
layers: 8

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt.FastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 512
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
