# I2-corrected: carry + post-NS residual scaling (rho2) — step size shrinks as fit closes.
patch_size: 16
dim: 256
layers: 2
n_loops: 4
ttt_state_mode: carry
input_injection: none

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: rho2
      n_loops_max: 4
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
