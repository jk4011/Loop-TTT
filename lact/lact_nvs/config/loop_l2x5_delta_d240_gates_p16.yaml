# Stack: d240x5 (best iso point) + Deja View/LT2 loop gates (0 FLOPs).
dim: 240
layers: 2
n_loops: 5
ttt_state_mode: reset
input_injection: none
loop_gates: true

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 60
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 240
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: delta
      n_loops_max: 5
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
