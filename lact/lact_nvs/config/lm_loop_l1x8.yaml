# LM transfer test: naive looped baseline (2 blocks x 4 loops, chunk-causal TTT)
vocab_size: 50257
dim: 256
layers: 1
n_loops: 8
seq_len: 1024
ttt_chunk: 256
block_config:
  - type: model.SelfAttention
    length_dim: vl
    params:
      head_dim: 64
      use_qk_norm: true
      causal: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: none
      n_loops_max: 8
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
