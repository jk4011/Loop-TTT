# TTT-loop flagship (agents 4,6,7): feature Anderson/Nesterov extrapolation.
# x += beta[loop]*(x-x_prev) at each loop start (beta zero-init) -> extrapolate the
# feature fixed-point iteration along its own convergence direction = free effective
# depth, in feature space where Muon cannot erase it.
patch_size: 16
dim: 256
layers: 2
ttt_state_mode: reset
input_injection: none
feat_mom: true

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt.FastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
