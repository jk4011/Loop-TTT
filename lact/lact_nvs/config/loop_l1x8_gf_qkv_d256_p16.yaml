# gf + inner_qkv decomposition (inner-affine site ablation)
# (all zero-init, zero FLOPs).
patch_size: 16
dim: 256
layers: 1
n_loops: 8
ttt_state_mode: reset
input_injection: none
loop_gates: true
loop_film: true

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
      loop_inner: qkv
      n_loops_max: 8
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: none
      n_loops_max: 8
      loop_inner: qkv
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
