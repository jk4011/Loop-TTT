# Geometry / Plücker addressing (agent 3): condition the fast-weight q/k on
# per-patch Plücker coords (ray dir + moment), swapped so q·k contains the
# epipolar reciprocal product d_t·m_i + m_t·d_i -> the memory retrieval concentrates
# on the epipolar line. This is the TTT-memory analog of the attention camera
# conditioning that gave +1.7 dB in the prior project. Zero-init -> baseline.
# The ONE remaining orthogonal high-ceiling axis (geometry, not optimization).
patch_size: 16
dim: 256
layers: 2
n_loops: 4
ttt_state_mode: reset
input_injection: none
geo_addr: true

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: none
      n_loops_max: 4
      geo_addr: true
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
