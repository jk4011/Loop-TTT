# Day-scale LM (TTT_camera_embedding lact_llm 규모): dim768 3x4loop(eff.12), seq4096, chunk1024, 2B tokens
vocab_size: 50257
dim: 768
layers: 3
n_loops: 4
loop_film: true
loop_gates: true
seq_len: 4096
ttt_chunk: 1024
block_config:
  - type: model.SelfAttention
    length_dim: vl
    params:
      head_dim: 64
      use_qk_norm: true
      causal: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 768
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: none
      n_loops_max: 4
      nl_cond: true
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
