# TTT-loop flagship (agents 9,5,2,6): cumulative-residual boost. Fixes boost's
# double-counting — carries the running residual r in TOKEN space and regresses
# each loop's fresh memory onto it (r <- r - h_{W_l}(k)), monotonically decremented.
# Proper stagewise gradient boosting -> the n memory instances span disjoint
# residual layers -> honest effective capacity x n_loops. carry threads r.
patch_size: 16
dim: 256
layers: 2
n_loops: 4
ttt_state_mode: carry
input_injection: none

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_loop.LoopFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      loop_mode: cumboost
      n_loops_max: 4
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
