co3d:
  _target_: dvlt.data.datasets.parser.dataverse.DataverseTrainDataset
  view_ranking: "pose"
  view_sampling: "random"
  window_size_ratio: 10.0
  depth_filter_background: false
  depth_filter_percentile: 98
  dataverse_cfg:
    target: "optimized_hdf5.OptimizedHDF5Dataset"
    params:
      data_root: "${user.data_root}/train/co3d/data_root"
      split_file: "${user.data_root}/train/co3d/split_file"
