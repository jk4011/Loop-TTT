scannetpp:
  _target_: dvlt.data.datasets.parser.dataverse.DataverseTrainDataset
  view_ranking: "pose"
  view_sampling: "random_ordered"
  window_size_ratio: 10.0
  dataverse_cfg:
    target: "scannetpp.ScanNetpp"
    params:
      data_root: "${user.data_root}/train/scannetpp/scannetpp_undistort"
      images_dir: "undistorted_images"
      depth_dir: "undistorted_depth"
      transforms_path: "nerfstudio/transforms_undistorted.json"
      split_file: "${user.data_root}/train/scannetpp/nvs_sem_train.txt"
