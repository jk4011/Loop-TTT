matrix_city_aerial:
  _target_: dvlt.data.datasets.parser.dataverse.DataverseTrainDataset
  view_ranking: "pose"
  view_sampling: "random"
  window_size_ratio: 1.0
  max_depth_thresh: 500.0
  dataverse_cfg:
    target: "matrix_city.MatrixCity"
    params:
      # format: indexed tar
      data_root: "${user.data_root}/train/matrix_city_aerial"
      split: "train"
      part: "aerial"
