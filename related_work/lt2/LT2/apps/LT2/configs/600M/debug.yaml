# Debug configuration for quick testing of looped window attention
dump_dir: <DATA_ROOT>/results/looped_window_debug
name: looped_window_debug
steps: 100
probe_freq: null
seed: 777
grad_acc_steps: 1
gc_collect_freq: 100

optim:
  lr: 3e-4
  weight_decay: 0.033
  warmup: 10
  lr_min_ratio: 0.1
  clip: 1.0

distributed:
  fsdp_type: full_shard
  compile: false  # Disable for debugging
  model_dtype: bf16
  matmul_allow_tf32: false
  selective_activation_checkpointing: false
  tp_size: 1
  spawn_method: spawn

model:
  dim: 512
  n_layers: 4  # Small number of physical layers
  n_heads: 8
  vocab_size: -1  # Will be auto-set
  weight_tying: false
  seed: 42
  head_dim: null
  n_kv_heads: null
  ffn_dim_multiplier: null
  multiple_of: 256
  norm_eps: 1e-5
  rope_theta: 10000.0
  init_base_std: null
  init_std_factor: "disabled"
  max_seqlen: 1024  # Will be auto-set to data.seq_len
  
  # Looped window attention specific
  loop_count: 2  # Loop through layers 2 times -> effective depth of 8
  attention_pattern: "3:1"  # 3 sliding window layers, 1 full attention layer (3 window, 1 full, repeated)
  default_sliding_window: 512

data:
  root_dir: <DATA_ROOT>/data/
  sources:
    fineweb_edu_100bt: 1.0
  batch_size: 2
  prefetch_size: 128
  seq_len: 1024
  n_views: 2
  load_async: true
  add_bos: true
  add_eos: true
  tokenizer:
    name: tiktoken
    path: <REPO_ROOT>/tokenizer/original/tokenizer.model

profiling:
  run: false
  mem_warmup: 0
  mem_steps: 4
  profile_warmup: 10
  profile_steps: 4

checkpoint:
  dump:
    every: 50
    keep: 3
  eval:
    every: 1000000
    keep: -1

logging:
  freq: 10
  wandb: null

async_eval_gpus: null
eval: null

