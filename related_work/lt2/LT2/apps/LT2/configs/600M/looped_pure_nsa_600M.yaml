# Looped Window Attention 600M with pure Native Sparse Attention (fla.layers.NativeSparseAttention)
# Requires: pip install flash-linear-attention (NSA Triton ops; CUDA)
#
# Sliding window (nsa_window_size > 0): fla calls flash_attn_func. If flash_attn (FA2) fails to load
# (e.g. GLIBC), training patches in Flash Attention 3 via `import flash_attn_interface` automatically.
# To always use FA3 for that path: export LINGUA_FLA_NSA_USE_FLASH_ATTN3=1
# Without FA2 or FA3: set nsa_window_size: 0.
#
# fla parallel_nsa requires (n_heads // n_kv_heads) % 16 == 0, so MHA (n_kv_heads == n_heads) is invalid.
# This config uses GQA with n_kv_heads: 1 (16 query heads per KV head).
#
# Example:
#   torchrun --nproc-per-node 8 -m apps.LT2.train \
#     config=apps/LT2/configs/600M/looped_pure_nsa_600M.yaml

dump_dir: <DATA_ROOT>/results/looped_pure_nsa_600M
name: looped_pure_nsa_600M
steps: 255_000
probe_freq: null
seed: 777
grad_acc_steps: 4
gc_collect_freq: 1000

optim:
  lr: 3e-4
  weight_decay: 0.1
  warmup: 10000
  lr_min_ratio: 0.000001
  clip: 1.0

distributed:
  fsdp_type: full_shard
  compile: true
  model_dtype: bf16
  matmul_allow_tf32: false
  selective_activation_checkpointing: false
  tp_size: 1
  spawn_method: spawn

model:
  dim: 1024
  n_layers: 25
  n_heads: 16
  n_kv_heads: 1
  vocab_size: -1
  weight_tying: false
  seed: 42
  head_dim: null
  ffn_dim_multiplier: null
  multiple_of: 256
  norm_eps: 1e-5
  rope_theta: 10000.0
  init_base_std: null
  init_std_factor: "disabled"
  max_seqlen: 4096

  loop_count: 4
  use_residual: true
  use_block_residual: false

  layer_pattern: "nsa"
  nsa_block_size: 32
  nsa_block_counts: 8
  nsa_window_size: 128
  nsa_qkv_bias: false

data:
  root_dir: <DATA_ROOT>/data/
  sources:
    fineweb_edu_100bt: 1.0
  batch_size: 3
  prefetch_size: 1024
  seq_len: 4096
  n_views: 2
  load_async: true
  add_bos: true
  add_eos: true
  tokenizer:
    name: tiktoken
    path: <REPO_ROOT>/tokenizer/original/tokenizer.model

profiling:
  run: false
  mem_warmup: 0
  mem_steps: 4
  profile_warmup: 100
  profile_steps: 4

checkpoint:
  dump:
    every: 25400
    keep: 13
  eval:
    every: 15000000
    keep: -1

logging:
  freq: 10
  wandb:
    project: "looped_transformer"
    name: "looped_pure_nsa_600M"

async_eval_gpus: 4
eval:
  generator:
    max_tokens: 4096
    dtype: bf16
    temperature: 1.0
    top_p: 0.95
  harness:
    tasks:
      - hellaswag
      - task: boolq
        dataset_kwargs:
          trust_remote_code: true
      - piqa
      - task: social_iqa
        dataset_kwargs:
          trust_remote_code: true
      - winogrande
      - openbookqa
      - arc_easy
      - arc_challenge
      - race
      - commonsense_qa
      - copa
    log_samples: true
    verbosity: "INFO"
  validation: null
