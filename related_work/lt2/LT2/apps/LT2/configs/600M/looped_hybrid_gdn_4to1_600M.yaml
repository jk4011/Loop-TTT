# Looped Window Attention 600M with interleaved GDN + full attention
# Architecture: 4 GDN layers for every 1 full-attention layer, looped 4 times
# GDN layers use flash-linear-attention (fla); full-attention layers use flash_attn3
# Physical layers: 21 (17 GDN + 4 full per cycle, looped x4 = 84 effective depth)

dump_dir: <DATA_ROOT>/results/looped_hybrid_gdn_4to1_600M
name: looped_hybrid_gdn_4to1_600M
steps: 255_000
probe_freq: null
seed: 777
grad_acc_steps: 4
gc_collect_freq: 1000

optim:
  lr: 3e-4
  weight_decay: 0.1
  warmup: 10000
  lr_min_ratio: 0.000001
  clip: 1.0

distributed:
  fsdp_type: full_shard
  compile: true
  model_dtype: bf16
  matmul_allow_tf32: false
  selective_activation_checkpointing: false
  tp_size: 1
  spawn_method: spawn

model:
  dim: 1024
  n_layers: 21
  n_heads: 16
  vocab_size: -1
  weight_tying: false
  seed: 42
  head_dim: null
  n_kv_heads: null
  ffn_dim_multiplier: null
  multiple_of: 256
  norm_eps: 1e-5
  rope_theta: 10000.0
  init_base_std: null
  init_std_factor: "disabled"
  max_seqlen: 4096

  # Looped window attention specific
  attn_impl: "flash_attn3"       # flash_attn3 for full-attention layers
  loop_count: 4
  use_residual: true
  use_block_residual: false

  # Interleaved GDN layer pattern: 4 GDN then 1 full-attention, repeated
  # GDN layers use flash-linear-attention; full-attention layers use flash_attn3
  layer_pattern: "interleaved:4:1:gdn:full"

  # Full causal attention for full-attention layers (no sliding window)
  attention_pattern: "0:1"
  default_sliding_window: null

data:
  root_dir: <DATA_ROOT>/data/
  sources:
    fineweb_edu_100bt: 1.0
  batch_size: 3
  prefetch_size: 1024
  seq_len: 4096
  n_views: 2
  load_async: true
  add_bos: true
  add_eos: true
  tokenizer:
    name: tiktoken
    path: <REPO_ROOT>/tokenizer/original/tokenizer.model

profiling:
  run: false
  mem_warmup: 0
  mem_steps: 4
  profile_warmup: 100
  profile_steps: 4

checkpoint:
  dump:
    every: 25400
    keep: 13
  eval:
    every: 15000000
    keep: -1

logging:
  freq: 10
  wandb:
    project: "looped_transformer"
    name: "looped_hybrid_gdn_4to1_600M"

async_eval_gpus: 4
eval:
  generator:
    max_tokens: 4096
    dtype: bf16
    temperature: 1.0
    top_p: 0.95
  harness:
    tasks:
      - hellaswag
      - task: boolq
        dataset_kwargs:
          trust_remote_code: true
      - piqa
      - task: social_iqa
        dataset_kwargs:
          trust_remote_code: true
      - winogrande
      - openbookqa
      - arc_easy
      - arc_challenge
      - race
      - commonsense_qa
      - copa
    log_samples: true
    verbosity: "INFO"
  validation: null
