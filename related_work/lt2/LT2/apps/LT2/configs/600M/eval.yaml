# Evaluation config for AUNet 1B model - clean and minimal
name: "eval_LT2"
dump_dir: <DATA_ROOT>/results/eval_LT2
ckpt_dir: <DATA_ROOT>/results/looped_600M_bookend_2_looped4_window_128/checkpoints/0000254000

# Generator settings for inference
generator:
  max_tokens: 16384  # Must be >= max value in harness.metadata.max_seq_lengths
  dtype: bf16

# LM Evaluation Harness tasks - same as eval_clean
harness:
  tasks:
    - hellaswag
    - task: boolq
      dataset_kwargs:
        trust_remote_code: true
    - piqa
    - task: sciq
      dataset_kwargs:
        trust_remote_code: true
    - winogrande
    - openbookqa
    - arc_easy
    - arc_challenge
    - commonsense_qa
    # - wikitext
    # - lambada_openai
    - copa
