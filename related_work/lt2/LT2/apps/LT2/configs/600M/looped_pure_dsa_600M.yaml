# Looped Window Attention 600M  pure DSA (all layers DeepSeek sparse MLA, TileLang kernel)
# Architecture: 20 physical DSA layers, looped x4 = 80 effective depth
#
# Parameter count: ~596M
#   per DSA block (dim=1024, n_heads=16, n_kv_heads=1): 28.2M
#     q_proj (16 heads x 576):    9.4M
#     kv_proj (1 group x 576):    0.6M   MLA-style shared K/V
#     o_proj (16 heads x 512):    8.4M
#     q_score_proj (16 x 64):     1.0M   cheap scoring query
#     k_score_proj (1 x 64):      0.07M  cheap scoring key
#     ffn (SwiGLU, hidden=2816):  8.7M
#     norms (2 x RMSNorm):        0.002M
#   20 blocks:  563.7M
#   embeddings: 32.8M  (vocab=32000)
#   TOTAL:      596.4M
#
# DSA kernel constraints (sparse_mla_fwd.py):
#   dsa_dim + dsa_tail_dim == 576  (hardcoded)
#   dsa_topk % dsa_block_i == 0   (2048 % 64 == 0 )
#   n_kv_heads must be 1           (kv_group=1)

dump_dir: <DATA_ROOT>/results/looped_pure_dsa_600M
name: looped_pure_dsa_600M
steps: 255_000
probe_freq: null
seed: 777
grad_acc_steps: 4
gc_collect_freq: 1000

optim:
  lr: 3e-4
  weight_decay: 0.1
  warmup: 10000
  lr_min_ratio: 0.000001
  clip: 1.0

distributed:
  fsdp_type: full_shard
  compile: false          # DSABlock uses @torch.compiler.disable (TileLang custom CUDA)
  model_dtype: bf16
  matmul_allow_tf32: false
  selective_activation_checkpointing: false
  tp_size: 1
  spawn_method: spawn

model:
  dim: 1024
  n_layers: 20
  n_heads: 16
  n_kv_heads: 1            # kv_group=1 required by DSA kernel
  vocab_size: -1
  weight_tying: false
  seed: 42
  head_dim: null
  ffn_dim_multiplier: null
  multiple_of: 256
  norm_eps: 1e-5
  rope_theta: 10000.0
  init_base_std: null
  init_std_factor: "disabled"
  max_seqlen: 4096

  loop_count: 4
  use_residual: true
  use_block_residual: false

  layer_pattern: "dsa"

  # DSA sparse MLA kernel parameters
  dsa_dim: 512             # Main K/V dim (d_v); must be power of 2
  dsa_tail_dim: 64         # Tail dim; dsa_dim + dsa_tail_dim must == 576
  dsa_topk: 2048           # Sparse positions per query
  dsa_block_i: 64          # Kernel tile size (must divide dsa_topk)
  dsa_score_dim: 64        # per-head dim for cheap scoring Q_s x K_s (index selection)
  dsa_sm_scale: null       # null ?????? 1/sqrt(576) * log2(e)

  # attention_pattern is irrelevant for pure DSA (no full-attn layers)
  attention_pattern: "1:0"
  default_sliding_window: null

data:
  root_dir: <DATA_ROOT>/data/
  sources:
    fineweb_edu_100bt: 1.0
  batch_size: 3
  prefetch_size: 1024
  seq_len: 4096
  n_views: 2
  load_async: true
  add_bos: true
  add_eos: true
  tokenizer:
    name: tiktoken
    path: <REPO_ROOT>/tokenizer/original/tokenizer.model

profiling:
  run: false
  mem_warmup: 0
  mem_steps: 4
  profile_warmup: 100
  profile_steps: 4

checkpoint:
  dump:
    every: 25400
    keep: 13
  eval:
    every: 15000000
    keep: -1

logging:
  freq: 10
  wandb:
    project: "looped_transformer"
    name: "looped_pure_dsa_600M"

async_eval_gpus: 4
eval:
  generator:
    max_tokens: 4096
    dtype: bf16
    temperature: 1.0
    top_p: 0.95
  harness:
    tasks:
      - hellaswag
      - task: boolq
        dataset_kwargs:
          trust_remote_code: true
      - piqa
      - task: social_iqa
        dataset_kwargs:
          trust_remote_code: true
      - winogrande
      - openbookqa
      - arc_easy
      - arc_challenge
      - race
      - commonsense_qa
      - copa
    log_samples: true
    verbosity: "INFO"
  validation: null
