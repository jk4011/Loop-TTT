# Looped Window Attention 1B — full (dense) attention every layer with G1 SDPA sigmoid gate.
# Ablation of looped_1B_full_attn.yaml: identical in all settings except use_attn_gate=true.
#
# Gate: elementwise head-specific sigmoid gate applied to SDPA output before the output
# projection wo (position G1 in "Gated Attention for LLMs", Qiu et al., NeurIPS 2025).
# Gate formula: output = sdpa_out * sigmoid(x_normed @ W_gate.T), then output @ Wo.
# W_gate shape: (n_heads * head_dim, dim) = (2048, 2048) for this config.
# W_gate is zero-initialized so the gate starts at sigmoid(0) = 0.5 (neutral).
#
# Expected effects vs baseline (from paper on 1.7B dense models):
#   - Lower perplexity (~0.07 reduction at 400B tokens)
#   - Improved benchmark scores (MMLU, GSM8k, Hellaswag)
#   - Reduced attention sinks (first-token attention: ~46% -> ~5%)
#   - Reduced massive activations in hidden states
#   - Improved training stability (fewer loss spikes)

dump_dir: <DATA_ROOT>/results/looped_pure_full_attn_gated_1B
name: looped_pure_full_attn_gated_1B
steps: 255_000
probe_freq: null
seed: 777
grad_acc_steps: 6
gc_collect_freq: 1000

optim:
  lr: 3e-4
  weight_decay: 0.1
  warmup: 10000
  lr_min_ratio: 0.000001
  clip: 1.0

distributed:
  fsdp_type: full_shard
  compile: true
  model_dtype: bf16
  matmul_allow_tf32: false
  selective_activation_checkpointing: false
  tp_size: 1
  spawn_method: spawn

model:
  dim: 2048
  n_layers: 25
  n_heads: 16
  vocab_size: -1
  weight_tying: false
  seed: 42
  head_dim: null
  n_kv_heads: null
  ffn_dim_multiplier: null
  multiple_of: 256
  norm_eps: 1e-5
  rope_theta: 10000.0
  init_base_std: null
  init_std_factor: "disabled"
  max_seqlen: 4096

  loop_count: 4
  use_residual: true
  use_block_residual: false

  attention_pattern: "0:1"
  default_sliding_window: null

  layer_pattern: "full"

  # Gated attention ablation: G1 sigmoid gate after SDPA, before Wo projection.
  use_attn_gate: true

data:
  root_dir: <DATA_ROOT>/data/
  sources:
    fineweb_edu_100bt: 1.0
  batch_size: 2
  prefetch_size: 1024
  seq_len: 4096
  n_views: 2
  load_async: true
  add_bos: true
  add_eos: true
  tokenizer:
    name: tiktoken
    path: <REPO_ROOT>/tokenizer/original/tokenizer.model

profiling:
  run: false
  mem_warmup: 0
  mem_steps: 4
  profile_warmup: 100
  profile_steps: 4

checkpoint:
  dump:
    every: 25400
    keep: 13
  eval:
    every: 15000000
    keep: -1

logging:
  freq: 10
  wandb:
    project: "looped_transformer"
    name: "looped_pure_full_attn_gated_1B"

async_eval_gpus: 8
eval:
  generator:
    max_tokens: 4096
    dtype: bf16
    temperature: 1.0
    top_p: 0.95
  harness:
    tasks:
      - hellaswag
      - task: boolq
        dataset_kwargs:
          trust_remote_code: true
      - piqa
      - task: social_iqa
        dataset_kwargs:
          trust_remote_code: true
      - winogrande
      - openbookqa
      - arc_easy
      - arc_challenge
      - race
      - commonsense_qa
      - copa
    log_samples: true
    verbosity: "INFO"
  validation: null
